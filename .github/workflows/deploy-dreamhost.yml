name: Deploy to DreamHost

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load deploy config
        env:
          DEPLOY_CONFIG_JSON: ${{ secrets.DH_PROD_CONFIG_JSON }}
        run: |
          if [ -z "${DEPLOY_CONFIG_JSON}" ]; then
            echo "Missing required secret: DH_PROD_CONFIG_JSON"
            exit 1
          fi

          printf '%s' "${DEPLOY_CONFIG_JSON}" | jq empty

          required_keys='["ssh_key","host","user","remote_path","db_host","db_name","db_username","db_password"]'
          missing_keys=$(printf '%s' "${DEPLOY_CONFIG_JSON}" | jq -r --argjson required "${required_keys}" '$required - (keys_unsorted)')

          if [ "${missing_keys}" != "[]" ]; then
            echo "Missing required keys in DH_PROD_CONFIG_JSON: ${missing_keys}"
            exit 1
          fi

          {
            echo "DH_PROD_SSH_KEY<<EOF"
            printf '%s\n' "$(printf '%s' "${DEPLOY_CONFIG_JSON}" | jq -r '.ssh_key')"
            echo "EOF"
            echo "DH_PROD_HOST=$(printf '%s' "${DEPLOY_CONFIG_JSON}" | jq -r '.host')"
            echo "DH_PROD_USER=$(printf '%s' "${DEPLOY_CONFIG_JSON}" | jq -r '.user')"
            echo "DH_PROD_REMOTE_PATH=$(printf '%s' "${DEPLOY_CONFIG_JSON}" | jq -r '.remote_path')"
            echo "DH_PROD_DB_HOST=$(printf '%s' "${DEPLOY_CONFIG_JSON}" | jq -r '.db_host')"
            echo "DH_PROD_DB_NAME=$(printf '%s' "${DEPLOY_CONFIG_JSON}" | jq -r '.db_name')"
            echo "DH_PROD_DB_USERNAME=$(printf '%s' "${DEPLOY_CONFIG_JSON}" | jq -r '.db_username')"
            echo "DH_PROD_DB_PASSWORD=$(printf '%s' "${DEPLOY_CONFIG_JSON}" | jq -r '.db_password')"
          } >> "${GITHUB_ENV}"

          echo "::add-mask::$(printf '%s' "${DEPLOY_CONFIG_JSON}" | jq -r '.ssh_key')"
          echo "::add-mask::$(printf '%s' "${DEPLOY_CONFIG_JSON}" | jq -r '.db_password')"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${DH_PROD_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${DH_PROD_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to DreamHost
        run: |
          rsync -avz --delete \
            --exclude='config.php' \
            --exclude='cache/' \
            --exclude='uploads/' \
            --exclude='logs/' \
            --exclude='.DS_Store' \
            --exclude='.dh-diag/' \
            --exclude='*.log' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o IdentitiesOnly=yes" \
            public/ \
            ${DH_PROD_USER}@${DH_PROD_HOST}:${DH_PROD_REMOTE_PATH}

      - name: Generate config.php
        env:
          SSH_USER: ${{ env.DH_PROD_USER }}
          SSH_HOST: ${{ env.DH_PROD_HOST }}
          REMOTE_PATH: ${{ env.DH_PROD_REMOTE_PATH }}
        run: |
          cat > /tmp/config.php << EOF
          <?php
          if (!defined('ROOT_PATH')) {
              define('ROOT_PATH', __DIR__ . '/');
          }

          define('DB_HOST', '${{ env.DH_PROD_DB_HOST }}');
          define('DB_NAME', '${{ env.DH_PROD_DB_NAME }}');
          define('DB_USERNAME', '${{ env.DH_PROD_DB_USERNAME }}');
          define('DB_PASSWORD', '${{ env.DH_PROD_DB_PASSWORD }}');
          EOF
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o IdentitiesOnly=yes /tmp/config.php ${SSH_USER}@${SSH_HOST}:${REMOTE_PATH}config.php
          rm -f /tmp/config.php

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
