<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f3ede3">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Hello PWA">
  <title>Hello PWA</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero-card">
      <p class="eyebrow">PWA TEST</p>
      <h1>Hello World</h1>
      <p class="copy">This is a tiny Progressive Web App for quick install and phone testing.</p>
      <button class="install-button is-hidden" type="button" data-install-button>Install App</button>
      <p class="hint" data-install-hint>Open this page on your phone and add it to the home screen to test the app-like experience.</p>
    </section>
  </main>
  <script src="/app.js" defer></script>
</body>
</html>
